services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    ports:
      - '${WEB_PORT:-5173}:5173'
    depends_on:
      api:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soc_web}
      POSTGRES_USER: ${POSTGRES_USER:-soc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-soc} -d ${POSTGRES_DB:-soc_web}']
      interval: 5s
      timeout: 5s
      retries: 12

  db-migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soc_web}
      POSTGRES_USER: ${POSTGRES_USER:-soc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soc}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DATABASE_URL: postgresql://${POSTGRES_USER:-soc}:${POSTGRES_PASSWORD:-soc}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-soc_web}?sslmode=disable
    command: ['sh', '-c', 'pnpm db:push']

  redis:
    image: redis:7-alpine
    command: ['redis-server', '/usr/local/etc/redis/redis.conf']
    volumes:
      - redis_data:/data
      - ./infra/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '127.0.0.1:${NGINX_PORT:-8080}:80'
    volumes:
      - ./infra/docker/nginx/api.conf:/etc/nginx/conf.d/api.conf:ro
      - ./infra/docker/nginx/web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
